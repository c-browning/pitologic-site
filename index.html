<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pitot Logic</title>
<meta name="description" content="Something is coming. Pitot Logic — pitotlogic.com">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&family=Syne:wght@700;800&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:     #161c24;
    --line:   rgba(255,255,255,0.06);
    --accent: #4a9bbe;
    --text:   #dde4ec;
    --muted:  #4a6070;
    --dim:    #2a3a4a;
  }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--line) 1px, transparent 1px),
      linear-gradient(90deg, var(--line) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 40%, #0d1118 100%);
    pointer-events: none;
    z-index: 0;
  }
  .container {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 40px;
    text-align: center;
    padding: 40px 24px;
    animation: fadeUp 0.8s ease both;
  }
  .logo svg { width: 260px; height: auto; }
  .divider {
    width: 1px;
    height: 48px;
    background: linear-gradient(to bottom, transparent, var(--muted), transparent);
  }
  .headline {
    font-family: 'Syne', sans-serif;
    font-size: clamp(13px, 2vw, 16px);
    font-weight: 700;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .status {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--muted);
    border: 1px solid var(--dim);
    padding: 8px 18px;
    border-radius: 2px;
  }
  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 2.4s ease-in-out infinite;
  }
  .form {
    display: flex;
    gap: 0;
    width: 100%;
    max-width: 360px;
  }
  .form input {
    flex: 1;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--dim);
    border-right: none;
    border-radius: 2px 0 0 2px;
    padding: 12px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }
  .form input::placeholder { color: var(--muted); }
  .form input:focus { border-color: #2d5a6e; }
  .form button {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    background: var(--accent);
    color: var(--bg);
    border: none;
    padding: 12px 20px;
    border-radius: 0 2px 2px 0;
    cursor: pointer;
    transition: background 0.2s;
    white-space: nowrap;
  }
  .form button:hover { background: #5ab0d4; }
  .note {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    color: var(--dim);
    text-transform: uppercase;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.3; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="logo">
    <svg viewBox="0 0 280 50" fill="none" xmlns="http://www.w3.org/2000/svg">
      <text x="0" y="38" font-family="'DM Sans','Helvetica Neue',Arial,sans-serif" font-weight="500" font-size="34" letter-spacing="1.5" fill="#dde4ec">pitot</text>
      <g transform="translate(128, 8)">
        <path d="M0,0 L0,30 Q27,30 27,15 Q27,0 0,0 Z" fill="none" stroke="#dde4ec" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <line x1="-12" y1="9"  x2="0" y2="9"  stroke="#dde4ec" stroke-width="2" stroke-linecap="round"/>
        <line x1="-12" y1="21" x2="0" y2="21" stroke="#dde4ec" stroke-width="2" stroke-linecap="round"/>
        <line x1="27"  y1="15" x2="40" y2="15" stroke="#dde4ec" stroke-width="2" stroke-linecap="round"/>
        <path d="M35,10 L42,15 L35,20" fill="none" stroke="#dde4ec" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
      <text x="184" y="38" font-family="'DM Sans','Helvetica Neue',Arial,sans-serif" font-weight="500" font-size="34" letter-spacing="1.5" fill="#dde4ec">logic</text>
    </svg>
  </div>
  <div class="divider"></div>
  <p class="headline">Something is coming.</p>
  <div class="status">
    <div class="status-dot"></div>
    In development
  </div>
  <div class="form">
    <input type="email" placeholder="your@email.com">
    <button>Notify me</button>
  </div>
  <p class="note">© 2026 Pitot Logic LLC</p>
</div>
</body>
</html>
